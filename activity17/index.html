<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Store — Fetch / State / Events Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <h1>🛒 Mini Store</h1>
  </header>

  <main class="layout">

    <!-- Controls: filter + search (event listeners live here) -->
    <section class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search products…"
        autocomplete="off"
      />

      <div class="filters" id="filterButtons">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Electronics">Electronics</button>
        <button class="filter-btn" data-category="Home">Home</button>
        <button class="filter-btn" data-category="Stationery">Stationery</button>
      </div>
    </section>

    <!-- Status area reflects loading state -->
    <p id="status" class="status">Loading products…</p>

    <!-- Product list rendered from fetched + filtered state -->
    <section id="productGrid" class="grid"></section>

    <!-- Cart panel reflects cart state -->
    <aside class="cart">
      <h2>Cart (<span id="cartCount">0</span>)</h2>
      <ul id="cartList"></ul>
      <p class="cart-total">Total: $<span id="cartTotal">0.00</span></p>
      <button id="clearCartBtn">Clear Cart</button>
    </aside>

  </main>

  <script src="script.js"></script>
</body>
</html>
