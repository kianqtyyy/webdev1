<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Components Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="showcase-container">

    <section class="component-wrapper">
      <h2 class="component-title">The Blockquote</h2>
      <div class="blockquote-card">
        <blockquote class="quote">
          "What Ever Happens, happened"
          <cite class="author">— Kian2k26</cite>
        </blockquote>
      </div>
    </section>

    <section class="component-wrapper">
      <h2 class="component-title">The Stat Counter Card</h2>
      <div class="stat-card">
        <div class="stat-item">
          <span class="stat-value">121</span>
          <span class="stat-label">Tickets</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">4.8d</span>
          <span class="stat-label">Avg Cycle</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">59%</span>
          <span class="stat-label">SLA</span>
        </div>
      </div>
    </section>

    <section class="component-wrapper">
      <h2 class="component-title">The Username Field</h2>
      <div class="input-container">
        <label for="username" class="input-label">Username</label>
        <input type="text" id="username" class="username-input" placeholder="johnsmith23">
      </div>
    </section>

    <section class="component-wrapper">
      <h2 class="component-title">Make It Beautiful Banner</h2>
      <div class="banner">
        <h1 class="banner-title">Make It Beautiful like me</h1>
        <p class="banner-subtitle">Design is not just what it looks like and feels like.</p>
      </div>
    </section>

    <section class="component-wrapper">
      <h2 class="component-title"> The Pricing Card</h2>
      <div class="pricing-card">
        <span class="pricing-tier">Annual</span>
        <div class="price-container">
          <span class="currency">₹</span>
          <span class="amount">1,200</span>
          <span class="period">/yr</span>
        </div>
      </div>
    </section>

  </div>

</body>
</html>
