<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Components</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card-profile">
    <div class="user-pic">JD</div>
    <h2 class="user-name">Juan Dela Cruz</h2>
    <p class="user-title">UX/UI Designer</p>
  </div>

  <div class="price-row">
    <div class="box-tier">
      <span class="tier-label">BASIC</span>
      <span class="amount">₱299<small>/mo</small></span>
    </div>
    <div class="box-tier">
      <span class="tier-label">PRO</span>
      <span class="amount">₱599<small>/mo</small></span>
    </div>
    <div class="box-tier">
      <span class="tier-label">PREMIUM</span>
      <span class="amount">₱999<small>/mo</small></span>
    </div>
  </div>

  <nav class="main-nav">
    <div class="brand">Brandly</div>
    <div class="links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
    </div>
    <button class="signup-btn">Sign Up</button>
  </nav>

  <div class="comment-box">
    <div class="initials">MK</div>
    <div class="msg-body">
      <h4>Mark Reyes</h4>
      <p>This is basic. Finally made Flexbox click for me. The layout wrapping is next, ready for part two on site!</p>
    </div>
  </div>

  <div class="tags-list">
    <span class="badge">HTML</span>
    <span class="badge">CSS</span>
    <span class="badge">JavaScript</span>
    <span class="badge">React</span>
    <span class="badge">Responsive Design</span>
    <span class="badge">Git</span>
  </div>

</body>
</html>
